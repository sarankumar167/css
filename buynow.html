<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            
            margin-top: 100px;
        }
    
            
        
       .img{
            border: 2px solid black;
            border-radius: 20px 1%;

            height:200px;
            width:auto;
            display: block;
            margin: auto;
            padding: 20px;
        }
        div{
            text-align: center;
            display:block;
            margin: auto;
            color: black;
        }
        
@media only screen and (max-width: 600px) {
  body {
    background-color: aquamarine;
    text-align: center;
    margin: auto;
    font-size: x-small;
    margin-top: 100px;
  }
}
@media only screen and (orientation: landscape) {
    body{
        background-color: lightblue;
    }
    
}

    </style>
</head>
<body>
    
        <img  class="img"  src="rog.jpeg">
        <div>
        <h2>ASUS ROG Phone 9 Pro</h2>
        <p>Price : $1000000</p>
        <button>Buy Now</button>
    </div>
    
</body>
</html>
